<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Sankalp Hi-Tech Nursery</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  
  <div class="vh-auth-page">
    <div class="masterpiece-bg">
      <div class="neo-glass-bg">
        <div class="neo-blob neo-blob-1"></div>
        <div class="neo-blob neo-blob-2"></div>
        <div class="neo-blob neo-blob-3"></div>
      </div>
      <div class="polyhouse-grid"></div>
      <div class="auth-overlay"></div>
      <div class="leaf-particle-container">
        <div class="leaf-particle" style="left: 10%; width: 30px; height: 18px; filter: blur(1px); animation-delay: 0s"></div>
        <div class="leaf-particle" style="left: 40%; width: 22px; height: 14px; filter: blur(2px); animation-delay: 5s"></div>
        <div class="leaf-particle" style="left: 70%; width: 35px; height: 20px; filter: blur(1px); animation-delay: 10s"></div>
      </div>
    </div>

    <div class="vh-auth-container">
      <div class="vh-auth-card masterpiece-card">
        <div class="masterpiece-icon">
          <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v8M12 10s4-4 8-4 8 4 8 4M12 10s-4-4-8-4-8 4-8 4M12 22v-4" />
            <circle cx="12" cy="14" r="4" />
          </svg>
        </div>

        <h1 class="vh-auth-title">Welcome Back</h1>
        <p class="vh-auth-sub">Sign in to your high-tech nursery dashboard</p>

        <button class="vh-auth-google masterpiece-btn-secondary" onclick="alert('Google login integration pending')">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z" />
          </svg>
          Continue with Google
        </button>

        <div class="vh-auth-divider">
          <span>OR</span>
        </div>

        <form id="login-form" class="vh-auth-form">
          <div class="vh-form-group">
            <label for="email">Email Address</label>
            <div class="vh-auth-input-box">
              <svg class="vh-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
              <input type="email" id="email" required placeholder="name@domain.com" />
            </div>
          </div>

          <div class="vh-form-group">
            <label for="password">Password</label>
            <div class="vh-auth-input-box">
              <svg class="vh-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              <input type="password" id="password" required placeholder="••••••••" />
            </div>
          </div>

          <p id="error-msg" class="error-msg" style="display: none; color: #ff4d4d; font-size: 0.9rem; margin-top: 0.5rem"></p>

          <div class="vh-form-group">
            <label>Select Your Role</label>
            <div class="role-selection-grid">
              <div id="role-farmer" class="role-card active" onclick="setRole('farmer')">
                <div class="role-card-icon">🌱</div>
                <span>Farmer</span>
              </div>
              <div id="role-admin" class="role-card" onclick="setRole('admin')">
                <div class="role-card-icon">🛠️</div>
                <span>Admin</span>
              </div>
            </div>
          </div>

          <button type="submit" id="submit-btn" class="vh-btn vh-btn-submit btn-shimmer" style="width: 100%; margin-top: 1.5rem">
            <span>Sign In</span>
          </button>
        </form>

        <div class="vh-auth-switch">
          New to Sankalp? <a href="/register.html">Create an account</a>
        </div>
      </div>
      <div class="vh-auth-footer">
        By continuing, you agree to receive seedling order updates from our facility
      </div>
    </div>
  </div>

  <script src="/js/navbar.js"></script>
  <script>
    renderNavbar();
    let currentRole = 'farmer';

    function setRole(role) {
      currentRole = role;
      document.getElementById('role-farmer').classList.toggle('active', role === 'farmer');
      document.getElementById('role-admin').classList.toggle('active', role === 'admin');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error-msg');
      const submitBtn = document.getElementById('submit-btn');

      errorEl.style.display = 'none';

      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters long.';
        errorEl.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span>Processing...</span>';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          if (currentRole !== result.role) {
            errorEl.textContent = `Access denied. Your account is registered as ${result.role}.`;
            errorEl.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<span>Sign In</span>';
            return;
          }

          localStorage.setItem('token', result.token);
          localStorage.setItem('user', JSON.stringify({ 
            id: result._id, 
            name: result.name, 
            role: result.role 
          }));

          const urlParams = new URLSearchParams(window.location.search);
          const redirect = urlParams.get('redirect') || (result.role === 'admin' ? '/admin.html' : '/index.html');
          window.location.href = redirect;
        } else {
          errorEl.textContent = result.message || 'Invalid credentials.';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'System connection error. Please try again.';
        errorEl.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Sign In</span>';
      }
    });
  </script>
</body>
</html>
